<section>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h3 class="h5 mb-1">Core metadata</h3>
      <p class="mb-0 text-body-secondary">Update the album identity fields without leaving this review task.</p>
    </div>
  </div>
  {% if not reviewIsEditable %}
    <div class="alert alert-secondary">This review task is resolved and now read-only.</div>
  {% endif %}
  <form id="review-album-form" action="{{ url_for('frontend.update_metadata_review_task_album', task_id=reviewTask.id) }}">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label" for="review-album-name">Album title</label>
        <input class="form-control" id="review-album-name" type="text" value="{{ reviewAlbum.name }}"{% if not reviewIsEditable %} disabled{% endif %}>
      </div>
      <div class="col-md-6">
        <label class="form-label" for="review-album-artist">Primary artist</label>
        <input class="form-control" id="review-album-artist" type="text" value="{{ reviewAlbum.artist.get_artist_name() }}" autocomplete="off"{% if not reviewIsEditable %} disabled{% endif %}>
        <div id="review-album-artist-suggestions" class="list-group mt-2 d-none"></div>
      </div>
      <div class="col-md-4">
        <label class="form-label" for="review-album-year">Release year</label>
        <input class="form-control" id="review-album-year" type="text" value="{{ reviewAlbum.year or '' }}"{% if not reviewIsEditable %} disabled{% endif %}>
      </div>
      <div class="col-md-8">
        <label class="form-label">Task context</label>
        <div class="metadata-review-inline-note">This task is scoped to one album. Changes here should only normalize this release.</div>
      </div>
    </div>
    {% if reviewIsEditable %}
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save album changes</button>
      </div>
    {% endif %}
  </form>
</section>
